<header class="header" data-header>
  <div class="header__container container">
    <div class="header__content">
      <a class="header__logo" href="/" aria-label="Almazfond">
        <img class="header__logo-image" src="../assets/images/logo-desktop.png" alt="Almazfond" />
      </a>

      <nav class="header__nav" aria-label="Основная навигация" data-da=".header-menu__content,900,first">
        <a class="header__nav-link" href="#catalog">Каталог</a>
        <a class="header__nav-link" href="#about">О нас</a>
        <a class="header__nav-link" href="#delivery">Доставка и оплата</a>
        <a class="header__nav-link" href="#contacts">Контакты</a>
      </nav>

      <div class="header__search" data-da=".page,480,2">
        <div class="header__search-content">
          <button class="header__search-back" type="button" aria-label="Закрыть поиск" data-header-search-toggle>
            <svg width="24" height="24" aria-hidden="true">
              <use href="#icon-arrow-left"></use>
            </svg>
          </button>

          <form class="header__search-form" role="search">
            <label class="visually-hidden" for="site-search">Поиск</label>
            <input id="site-search" class="header__search-input" type="search" name="q"
              placeholder="Что хотите найти?" />
            <button class="header__search-submit" type="submit" aria-label="Найти">
              <svg width="24" height="24" aria-hidden="true">
                <use href="#icon-search"></use>
              </svg>
            </button>
          </form>
        </div>

        <div class="header__search-results">
          <a href="" class="header__search-result">
            <div class="header__search-result-image">
              <img src="../assets/images/search-result-product.png" alt="Изображение товара" width="50" height="50" />
            </div>
            <div class="header__search-result-info">
              <h4 class="header__search-result-name">Конфетница «Десерт»</h4>
              <p class="header__search-result-description">Латунь, золото, эмаль</p>
            </div>
          </a>
        </div>
      </div>

      <div class="header__actions" data-da=".header-menu__content,900,last">
        <div class="header__socials">
          <a class="header__social" href="https://t.me" aria-label="Telegram">
            <img src="../assets/images/logos_telegram.png" alt="Иконка телеграма" aria-hidden="true" width="30"
              height="30" />
          </a>
          <a class="header__social" href="#" aria-label="Социальная сеть">
            <img src="../assets/images/icon-purple-social.png" alt="Иконка max" aria-hidden="true" width="30"
              height="30" />
          </a>
        </div>

        <button class="header__cta button" type="button">Оставить заявку</button>
      </div>

      <button class="header__toggle-search" type="button" aria-label="Открыть поиск" data-header-search-toggle>
        <svg width="24" height="24" aria-hidden="true">
          <use href="#icon-search"></use>
        </svg>
      </button>
      <button class="header__burger-button" type="button" aria-label="Открыть меню" data-header-menu-toggle>
        <svg class="header__burger-icon" width="20" height="15" viewBox="0 0 20 15" fill="none"
          xmlns="http://www.w3.org/2000/svg">
          <path d="M20 14.5H0M20 7.5H0M20 0.5H0" stroke="#0E0E0F" />
        </svg>
        <svg class="header__close-icon" width="18" height="18" viewBox="0 0 18 18" fill="none"
          xmlns="http://www.w3.org/2000/svg">
          <path d="M7.31955e-05 17.3077L17.3077 4.02664e-06L18 0.692312L0.692378 18L7.31955e-05 17.3077Z"
            fill="#0E0E0F" />
          <path d="M0.692304 0L17.9999 17.3077L17.3076 18L0 0.692307L0.692304 0Z" fill="#0E0E0F" />
        </svg>
      </button>
    </div>
  </div>
</header>

<div class="header-menu" data-header-menu-panel>
  <div class="header-menu__content">

  </div>
</div>
