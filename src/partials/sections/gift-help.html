<section class="gift-help">
  <div class="gift-help__container container">
    <div class="gift-help__body">
      <div class="gift-help__panel" data-aos="fade-up">
        <h2 class="gift-help__title title-h2">
          Поможем сделать
          <span>великий подарок</span>
        </h2>
        <p class="gift-help__description" data-aos="fade-up" data-aos-delay="120">
          Который навсегда запомнится получателю.
        </p>

        <form class="gift-help__form" data-aos="fade-up" data-aos-delay="200" data-request-form>
          <div class="gift-help__input-wrapper input-wrapper">
            <input class="gift-help__input input" type="text" name="name" placeholder="Ваше имя">
          </div>
          <div class="gift-help__input-wrapper input-wrapper">
            <input class="gift-help__input input" type="tel" name="phone" placeholder="Ваш телефон" inputmode="tel">
          </div>
          <div class="gift-help__checkbox-wrapper checkbox-wrapper">
            <input class="gift-help__input-checkbox input-checkbox" type="checkbox" id="gift-help-checkbox" name="policy">
            <label for="gift-help-checkbox" class="checkbox">
              <svg width="15" height="10" aria-hidden="true">
                <use href="#icon-check"></use>
              </svg>
            </label>
            <p class="gift-help__checkbox-text checkbox-text" for="gift-help-checkbox">
              Я соглашаюсь с <a href="">политикой конфиденциальности</a> <br> и <a href="">обработкой персональных
                данных</a>
            </p>
          </div>
          <button type="submit" class="gift-help__form-button button">Подобрать изделие</button>
        </form>
      </div>
      <img src="../assets/images/gift-help-bg.png" alt="Фон" class="gift-help__img-bg" data-aos="fade-left">
    </div>
  </div>
</section>
